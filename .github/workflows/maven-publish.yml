# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  release:
    types: [published]

jobs:
  publish-maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: mvn -B clean package -DskipUTs --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml -Dmaven.test.skip=true
      env:
        GITHUB_TOKEN: ${{ github.token }}

  build-release-assets:
    needs: publish-maven
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-latest
          asset_suffix: linux
        - runner: windows-latest
          asset_suffix: windows
        - runner: macos-14
          asset_suffix: macos-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Detect asset name
      id: metadata
      shell: bash
      env:
        ASSET_SUFFIX: ${{ matrix.asset_suffix }}
      run: |
        JAVA_VERSION=$(java -version 2>&1 | awk -F '"' '/version/ {print $2; exit}')
        echo "java_version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"
        echo "asset_name=dongting-dist-${ASSET_SUFFIX}-jre${JAVA_VERSION}.zip" >> "$GITHUB_OUTPUT"

    - name: Build release asset
      run: mvn -B clean package -DskipUTs -PaddJRE --file pom.xml

    - name: Rename release asset
      shell: bash
      env:
        ASSET_NAME: ${{ steps.metadata.outputs.asset_name }}
      run: mv target/dongting-dist.zip "target/${ASSET_NAME}"

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./target/${{ steps.metadata.outputs.asset_name }}
        asset_name: ${{ steps.metadata.outputs.asset_name }}
        asset_content_type: application/zip
